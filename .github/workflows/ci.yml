name: Trevas CI

on:
  push:
  pull_request:
    types: [ opened, synchronize, reopened ]

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: "temurin"
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - name: Verify code format with Spotless
        run: mvn spotless:check
  test-excluding-vtl-sdmx:
    name: Run Trevas tests excluding vtl-sdmx module
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "adopt"
      # Also exclude vtl-prov because of vtl-sdmx scope test dependency
      - name: Test
        run: mvn install -pl vtl-parser && mvn test -pl '!vtl-sdmx,!vtl-prov'
  test:
    name: Run Trevas tests
    if: (github.repository != 'InseeFr/Trevas' &&
      github.event_name == 'push') ||
      (github.event.pull_request.head.repo.fork == true ||
      (github.event.pull_request.head.repo.fork == false &&
      github.event.pull_request.merged == false))
    runs-on: ubuntu-latest
    needs: format
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "adopt"
      - uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
                "id": "Github",
                "username": "${{ secrets.GH_PACKAGES_USERNAME }}",
                "password": "${{ secrets.GH_PACKAGES_PASSWORD }}"
            }]
      - name: Test
        run: mvn install -pl vtl-parser && mvn test

  spark-integration:
    name: Spark ${{ matrix.spark-label }}
    runs-on: ubuntu-latest
    needs: format
    strategy:
      fail-fast: false
      matrix:
        include:
          - module: vtl-spark
            spark-label: "3.x (Scala 2.12)"
            extra-args: ""
          - module: vtl-spark4
            spark-label: "4.x (Scala 2.13)"
            extra-args: ""
          - module: vtl-prov
            spark-label: "vtl-prov + Spark 4 (tests)"
            extra-args: "-Pspark4-tests"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
      - name: Cache Maven dependencies
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-
      - uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
                "id": "Github",
                "username": "${{ secrets.GH_PACKAGES_USERNAME }}",
                "password": "${{ secrets.GH_PACKAGES_PASSWORD }}"
            }]
      # Install shaded vtl-parser first, then exclude it from the reactor so dependent
      # modules resolve the installed jar (JPMS fr.insee.vtl.parser.shaded), not target/classes.
      - name: Test ${{ matrix.module }} (and upstream modules)
        run: mvn install -pl vtl-parser -DskipTests && mvn -B test -pl ${{ matrix.module }} -am --projects '!vtl-parser' ${{ matrix.extra-args }}

  package:
    name: Package Trevas modules
    # Filter thanks to test job
    runs-on: ubuntu-latest
    needs: [ test, spark-integration ]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Maven Central Repository
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "adopt"
      - uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
                "id": "Github",
                "username": "${{ secrets.GH_PACKAGES_USERNAME }}",
                "password": "${{ secrets.GH_PACKAGES_PASSWORD }}"
            }]
      - name: Test
        run: mvn package
