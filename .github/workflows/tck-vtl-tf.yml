name: Run VTL TF TCK

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone vtl spec repo (branch fix/tck-2.1)
        run: git clone --branch fix/tck-2.1 https://github.com/sdmx-twg/vtl.git

      - name: Install Python 3
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run TCK generator script
        run: |
          DOC_VERSION=v2.1 python3 vtl/scripts/generate_tck_files.py

      - name: Move generated TCK zip to resources
        run: |
          mkdir -p coverage/src/main/resources
          mv vtl/tck/v2.1.zip coverage/src/main/resources/

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: s4u/maven-settings-action@v3.0.0
        with:
          githubServer: false
          servers: |
            [{
                "id": "Github",
                "username": "${{ secrets.GH_PACKAGES_USERNAME }}",
                "password": "${{ secrets.GH_PACKAGES_PASSWORD }}"
            }]

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build and run tests
        continue-on-error: true
        run: mvn clean test --batch-mode

      # dorny/test-reporter titles come from Surefire <testcase name="…">; rewrite TCK names so
      # passed tests show "Test N" + newline + tab + path (see coverage/scripts/prettify_tck_surefire_xml.py).
      - name: Prettify TCK Surefire XML for GitHub
        if: always()
        run: python3 coverage/scripts/prettify_tck_surefire_xml.py

      - name: Publish JUnit test results
        uses: dorny/test-reporter@v2
        if: always()
        with:
          name: JUnit Test Report
          path: coverage/target/surefire-reports/*.xml
          reporter: java-junit
          list-tests: failed
          max-annotations: 50
          fail-on-error: 'false'

      - name: Add failed test details to job summary
        if: always()
        run: |
          REPORT_DIR="coverage/target/surefire-reports"
          if [ ! -d "$REPORT_DIR" ]; then
            exit 0
          fi
          {
            echo "## Failed test details (Surefire .txt)"
            shopt -s nullglob
            files=("$REPORT_DIR"/*.txt)
            if [ ${#files[@]} -eq 0 ]; then
              echo ""
              echo "_No surefire text reports found._"
              exit 0
            fi
            found=0
            for f in "${files[@]}"; do
              if rg -q "<<< FAILURE!|ERROR!|Failures:|Errors:" "$f"; then
                found=1
                echo ""
                echo "### $(basename "$f")"
                echo '```'
                sed -n '1,220p' "$f"
                echo '```'
              fi
            done
            if [ "$found" -eq 0 ]; then
              echo ""
              echo "_No failed tests detected in surefire .txt files._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
