name: Run VTL TF TCK (Spark 3)

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ master, develop ]

jobs:
  tck-spark3:
    name: TCK VTL v2.1 (Spark 3)
    runs-on: ubuntu-latest
    env:
      TCK_REPORT_TITLE: 'TCK VTL v2.1 (Spark 3)'
      VTL_TCK_BRANCH: fix/doc-examples

    steps:
      - name: Checkout main project
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Clone vtl spec repo
        run: git clone --depth 1 --branch "${VTL_TCK_BRANCH}" https://github.com/sdmx-twg/vtl.git

      - name: Install Python 3
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run TCK generator script
        run: |
          DOC_VERSION=v2.1 python3 vtl/scripts/generate_tck_files.py

      - name: Move generated TCK zip to resources
        run: |
          mkdir -p coverage/src/main/resources
          mv vtl/tck/v2.1.zip coverage/src/main/resources/

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: s4u/maven-settings-action@v4.0.0
        with:
          githubServer: false
          servers: |
            [{
                "id": "Github",
                "username": "${{ secrets.GH_PACKAGES_USERNAME }}",
                "password": "${{ secrets.GH_PACKAGES_PASSWORD }}"
            }]

      - name: Cache Maven packages
        uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-tck-spark3-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build dependencies and run TCK (coverage only)
        continue-on-error: true
        run: |
          mvn clean install -pl coverage -am -DskipTests --batch-mode
          mvn test -pl coverage --batch-mode

      - name: Prettify TCK Surefire XML for GitHub
        if: always()
        run: python3 coverage/scripts/prettify_tck_surefire_xml.py

      - name: Publish JUnit test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: JUnit (Spark 3)
          path: coverage/target/surefire-reports/*.xml
          reporter: java-junit
          only-summary: 'true'
          max-annotations: 0
          fail-on-error: 'false'
          fail-on-empty: 'false'

      - name: Generate TCK scripts report
        if: always()
        run: python3 coverage/scripts/render_tck_job_summary.py

      - name: Upload full TCK script report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tck-scripts-report-spark3
          path: coverage/target/tck-scripts-report.md
          if-no-files-found: ignore
